<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cloud.umami.is;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https: http:;
      media-src 'self' blob: https: http:;
      connect-src 'self' https: http: https://cloud.umami.is;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
    " />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#111111" />
    <!-- SEO tags managed by react-helmet-async / vite-react-ssg Head component -->
    <meta name="theme-color" content="#111111" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RadioSphere.be" />
    <meta property="og:image" content="https://radiosphere.be/og-image.png">
    <meta property="og:image:width" content="1920">
    <meta property="og:image:height" content="1005">
    <meta property="og:image:alt" content="RadioSphere.be — Free Global Radio">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://radiosphere.be/og-image.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "RadioSphere.be",
      "url": "https://radiosphere.be",
      "description": "Lecteur radio gratuit sans publicité avec 50 000+ stations. TimeBack Machine exclusive pour réécouter le direct.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "featureList": ["TimeBack Machine", "Streaming HD", "Chromecast", "Enregistrement MP3", "50 000+ stations", "230+ pays", "Zéro publicité"],
      "keywords": "radio gratuite, radio sans pub, timeback machine, écouter radio en ligne, streaming radio, radio en direct"
    }
    </script>

    <!-- Umami Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="73a30cfd-4d45-43c2-b296-c4d3a39cd898"></script>

    <script>
      // Cast SDK bridge — captures early availability before React mounts
      window.__castSdkReady = false;
      window['__onGCastApiAvailable'] = function(isAvailable) {
        console.log('[RadioSphere][Cast] Bridge: SDK available =', isAvailable);
        if (isAvailable) {
          window.__castSdkReady = true;
          window.dispatchEvent(new Event('castSdkReady'));
        }
      };
    </script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" async></script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
