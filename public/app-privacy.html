<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioSphere.be – Privacy Policy / Politique de Confidentialité</title>
    <meta name="description" content="Privacy Policy for the RadioSphere.be mobile application – all languages.">
    <style>
        :root {
            --bg-color: #0b0b14;
            --card-bg: rgba(25, 25, 45, 0.8); /* Opacité augmentée pour plus de lisibilité */
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-start: #4a90ff;
            --accent-end: #a855f7;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(74, 144, 255, 0.1), transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 300px; /* Empêche l'effet de carte vide pendant le chargement */
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p { 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .lang-btn:hover { 
            border-color: rgba(255, 255, 255, 0.3); 
            color: #fff;
            transform: translateY(-1px);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        /* Correction CSS : L'animation ne doit se déclencher que sur la classe active */
        .lang-section { 
            display: none; 
            opacity: 0;
        }

        .lang-section.active { 
            display: block; 
            opacity: 1;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .policy h2 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 0.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .policy .date {
            font-size: 0.85rem;
            color: var(--accent-start);
            margin-bottom: 2rem;
            display: block;
            margin-top: 1rem;
        }

        .policy p {
            font-size: 1rem;
            margin-bottom: 1.2rem;
            color: var(--text-main);
        }

        .policy h3 {
            font-size: 1.2rem;
            color: #fff;
            margin: 2rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .policy h3::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-start);
            border-radius: 50%;
        }

        .policy ul {
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
            list-style-type: none;
        }

        .policy ul li {
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
            position: relative;
        }

        .policy ul li::before {
            content: "•";
            position: absolute;
            left: -15px;
            color: var(--accent-end);
        }

        .policy footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.8;
        }

        .policy footer a {
            color: var(--accent-start);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RadioSphere.be</h1>
            <p>Privacy Policy / Politique de Confidentialité</p>
        </div>

        <div class="lang-switcher">
            <button class="lang-btn" id="btn-fr" onclick="showLang('fr')">🇫🇷 Français</button>
            <button class="lang-btn active" id="btn-en" onclick="showLang('en')">🇬🇧 English</button>
            <button class="lang-btn" id="btn-es" onclick="showLang('es')">🇪🇸 Español</button>
            <button class="lang-btn" id="btn-de" onclick="showLang('de')">🇩🇪 Deutsch</button>
            <button class="lang-btn" id="btn-ja" onclick="showLang('ja')">🇯🇵 日本語</button>
        </div>

        <div class="card">
            <div id="fr" class="lang-section">
                <div class="policy">
                    <h2>Politique de Confidentialité</h2>
                    <span class="date">Dernière mise à jour : 21 mars 2026</span>
